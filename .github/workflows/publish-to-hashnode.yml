name: Publish to Hashnode

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Find latest merged post
        id: find
        run: |
          FILE=$(ls -t content/posts/*.md 2>/dev/null | head -n1)
          if [ -z "$FILE" ]; then
            echo "No markdown post found"; exit 0
          fi
          echo "file=$FILE" >> $GITHUB_OUTPUT

      - name: Publish to Hashnode
        if: steps.find.outputs.file != ''
        env:
          HASHNODE_API_KEY: ${{ secrets.HASHNODE_API_KEY }}
          HASHNODE_PUBLICATION_ID: ${{ secrets.HASHNODE_PUBLICATION_ID }}
          FILE: ${{ steps.find.outputs.file }}
        run: |
          python - <<'PY'
          import os, requests, yaml, re, pathlib

          file = os.getenv('FILE')
          if not file:
              p = pathlib.Path('content/posts')
              files = sorted(p.glob('*.md'), key=lambda x: x.stat().st_mtime, reverse=True)
              if not files:
                  print("No post found"); exit(0)
              file = str(files[0])

          with open(file, 'r', encoding='utf-8') as f:
              full = f.read()

          match = re.match(r'^---\s*\n(.*?)\n---\s*\n(.*)$', full, re.DOTALL)
          meta = {}
          body = full
          if match:
              meta = yaml.safe_load(match.group(1))
              body = match.group(2).strip()

          title = meta.get('title', 'Autogenerated Post')
          tags = meta.get('tags', [])
          # published flag is not used – publishPost always publishes

          api_key = os.getenv('HASHNODE_API_KEY')
          publication_id = os.getenv('HASHNODE_PUBLICATION_ID')
          if not api_key or not publication_id:
              print("Missing HASHNODE_API_KEY or HASHNODE_PUBLICATION_ID secret")
              exit(0)


          # Create tag objects with both name and slug
          tag_objects = [{"name": t, "slug": t.lower().replace(' ', '-')} for t in tags]

          url = 'https://gql.hashnode.com'
          query = '''
          mutation PublishPost($input: PublishPostInput!) {
            publishPost(input: $input) {
              post { id, slug, title }
            }
          }
          '''
          variables = {
              "input": {
                  "title": title,
                  "contentMarkdown": body,
                  "tags": tag_objects,            # <-- now with name + slug
                  "publicationId": publication_id
              }
          }

          headers = {
              "Content-Type": "application/json",
              "Authorization": api_key
          }

          resp = requests.post(url, json={'query': query, 'variables': variables}, headers=headers)
          print("Status:", resp.status_code)
          data = resp.json()
          print(data)
          if resp.status_code == 200 and 'errors' not in data:
              print("Published successfully!")
          else:
              print("Publish failed. Response above.")
              exit(1)
          PY
