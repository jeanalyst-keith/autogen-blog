name: Publish to Hashnode

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Find latest merged post
        id: find
        run: |
          # find the most recent markdown file inside content/posts
          FILE=$(ls -t content/posts/*.md 2>/dev/null | head -n1)
          if [ -z "$FILE" ]; then
            echo "No markdown post found"; exit 0
          fi
          echo "file=$FILE" >> $GITHUB_OUTPUT

      - name: Publish to Hashnode
        if: steps.find.outputs.file != ''
        env:
          HASHNODE_API_KEY: ${{ secrets.HASHNODE_API_KEY }}
          FILE: ${{ steps.find.outputs.file }}
        run: |
          python - <<'PY'
          import os, requests, yaml, re, pathlib

          file = os.getenv('FILE')
          if not file:
              # fallback scan
              p = pathlib.Path('content/posts')
              files = sorted(p.glob('*.md'), key=lambda x: x.stat().st_mtime, reverse=True)
              if not files:
                  print("No post found")
                  exit(0)
              file = str(files[0])

          with open(file, 'r', encoding='utf-8') as f:
              full = f.read()

          # split front matter (YAML between ---) and body
          match = re.match(r'^---\s*\n(.*?)\n---\s*\n(.*)$', full, re.DOTALL)
          meta = {}
          body = full
          if match:
              meta = yaml.safe_load(match.group(1))
              body = match.group(2).strip()

          title = meta.get('title', 'Autogenerated Post')
          tags = meta.get('tags', [])
          published = meta.get('published', True)   # set true if you want immediate publish

          api_key = os.getenv('HASHNODE_API_KEY')
          if not api_key:
              print("HASHNODE_API_KEY not set; skipping publish")
              exit(0)

          query = '''
          mutation CreateStory($input: CreateStoryInput!) {
            createStory(input: $input) {
              post { _id, slug, title }
              success
              message
            }
          }
          '''
          variables = {
              "input": {
                  "title": title,
                  "contentMarkdown": body,
                  "tags": [ {"name": t} for t in tags ],
                  "publish": published
              }
          }

          headers = {
              "Content-Type": "application/json",
              "Authorization": api_key
          }

          resp = requests.post(
              'https://api.hashnode.com',
              json={'query': query, 'variables': variables},
              headers=headers
          )

          print("Status:", resp.status_code)
          data = resp.json()
          print(data)
          if resp.status_code == 200 and data.get('data', {}).get('createStory', {}).get('success'):
              print("Published successfully!")
          else:
              print("Publish failed. Response above.")
              exit(1)
          PY
