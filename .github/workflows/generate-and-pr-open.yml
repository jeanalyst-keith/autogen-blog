name: Generate Content & Open PR

on:
  schedule:
    - cron: '0 9 * * MON'   # every Monday 09:00 UTC, change if needed
  workflow_dispatch:        # allow manual run from Actions tab

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install jinja2

      - name: Run content generator
        env:
          AUTHOR_NAME: "${{ secrets.AUTHOR_NAME }}"
        run: |
          python scripts/generate_post.py

      - name: Commit generated content and open PR
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: autogenerated post"
          branch: autogen/post-${{ github.run_number }}-${{ github.run_attempt }}
          title: "[Autogen] New post ready for review"
          body: |
            This PR contains an autogenerated post.
            Please review, edit, and merge to publish.
          base: main
